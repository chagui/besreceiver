syntax = "proto3";

package taskforge;

option java_package = "com.taskforge.proto";
option java_outer_classname = "TaskProto";

enum Priority {
  PRIORITY_UNSPECIFIED = 0;
  LOW = 1;
  MEDIUM = 2;
  HIGH = 3;
  CRITICAL = 4;
}

enum Status {
  STATUS_UNSPECIFIED = 0;
  PENDING = 1;
  RUNNING = 2;
  COMPLETED = 3;
  FAILED = 4;
}

message Task {
  string id = 1;
  string name = 2;
  Priority priority = 3;
  Status status = 4;
  int64 created_at = 5;
  int64 updated_at = 6;
  map<string, string> labels = 7;
}

message TaskResult {
  string task_id = 1;
  Status status = 2;
  string output = 3;
  int64 duration_ms = 4;
}
