# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog\n
All notable changes to this project will be documented in this file.\n
"""
body = """
{%- macro remote_url() -%}
  https://github.com/chagui/besreceiver
{%- endmacro -%}

{% if version -%}
  ## [{{ version | trim_start_matches(pat="v") }}]({{ self::remote_url() }}/releases/tag/{{ version }}) - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
  ## [Unreleased]({{ self::remote_url() }}/compare/{{ previous.version }}...HEAD)
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
  ### {{ group | striptags | trim | upper_first }}
  {% for commit in commits %}
    - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}{{ commit.message | upper_first }}\
      {% if commit.remote.pr_number %} ([#{{ commit.remote.pr_number }}]({{ self::remote_url() }}/pull/{{ commit.remote.pr_number }})){% endif %}\
      {% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}
  {%- endfor %}
{% endfor %}\n
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^test", group = "<!-- 2 -->Testing" },
  { message = "^doc", group = "<!-- 3 -->Documentation" },
  { message = "^perf", group = "<!-- 4 -->Performance" },
  { message = "^refactor", group = "<!-- 5 -->Refactoring" },
  { message = "^style", group = "<!-- 6 -->Styling" },
  { message = "^chore", group = "<!-- 7 -->Miscellaneous" },
  { message = "^ci", group = "<!-- 8 -->CI" },
  { body = ".*security", group = "<!-- 9 -->Security" },
  { message = "^revert", group = "<!-- 10 -->Reverted" },
]
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"

# Strip PR number suffixes from commit messages — the remote integration
# already resolves them into linked references in the template.
commit_preprocessors = [
  { pattern = " ?\\(#\\d+\\)", replace = "" },
]

[git.filter]
exclude = [
  "^Merge",
  "^fixup!",
]

[remote.github]
owner = "chagui"
repo = "besreceiver"
