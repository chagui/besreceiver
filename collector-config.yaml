extensions:
  health_check:
    endpoint: "localhost:13133"

receivers:
  bes:
    endpoint: "localhost:8082"
    # Uncomment to enable mutual TLS on the BES gRPC endpoint.
    # Bazel clients must be pointed at --bes_backend=grpcs://... and configured
    # with a matching client certificate when client_ca_file is set.
    # tls:
    #   cert_file: /etc/otelcol/certs/server.crt
    #   key_file: /etc/otelcol/certs/server.key
    #   client_ca_file: /etc/otelcol/certs/ca.crt

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  batch:
    send_batch_size: 8192
    send_batch_max_size: 8192
    timeout: 200ms

exporters:
  otlp_grpc/datadog:
    endpoint: "localhost:4317"
    tls:
      insecure: true # Only acceptable for same-host communication (e.g. sidecar Datadog Agent).
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 5000
  debug:
    verbosity: basic

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: "localhost"
                port: 8888
  pipelines:
    traces:
      receivers: [bes]
      processors: [memory_limiter, batch]
      exporters: [otlp_grpc/datadog, debug]
    logs:
      receivers: [bes]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [bes]
      processors: [memory_limiter, batch]
      exporters: [otlp_grpc/datadog, debug]
