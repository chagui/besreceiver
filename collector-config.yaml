extensions:
  health_check:
    endpoint: "localhost:13133"
  # Uncomment to require a bearer token on the BES gRPC endpoint.
  # Must also be listed in service.extensions and referenced from
  # receivers.bes.auth.authenticator below.
  # bearertokenauth:
  #   scheme: "Bearer"
  #   tokens:
  #     - "REPLACE_WITH_SECRET_TOKEN"
  #   # Or load from disk and hot-reload on change:
  #   # filename: /etc/otelcol/bes-tokens.txt

receivers:
  bes:
    endpoint: "localhost:8082"
    # Uncomment alongside the bearertokenauth extension above to enforce auth.
    # auth:
    #   authenticator: bearertokenauth
    # Uncomment to enable mutual TLS on the BES gRPC endpoint.
    # Bazel clients must be pointed at --bes_backend=grpcs://... and configured
    # with a matching client certificate when client_ca_file is set.
    # tls:
    #   cert_file: /etc/otelcol/certs/server.crt
    #   key_file: /etc/otelcol/certs/server.key
    #   client_ca_file: /etc/otelcol/certs/ca.crt
    # PII controls — all default to false. Gating is by content: if
    # include_hostname is false, no hostname-like attribute is emitted
    # regardless of which pathway it arrived on (BuildStarted.host, a
    # BUILD_HOST workspace-status item, or a host build_metadata entry).
    # See docs/attributes.md for the full composition model.
    # pii:
    #   include_hostname: false            # bazel.host + host-like workspace/metadata keys
    #   include_username: false            # bazel.user + user-like workspace/metadata keys
    #   include_workspace_dir: false       # bazel.workspace_directory
    #   include_working_dir: false         # bazel.working_directory
    #   include_command_args: false        # bazel.action.command_line (slice)
    #   include_action_output_paths: false # bazel.action.primary_output
    #   include_workspace_status: false    # bazel.workspace.* pathway (per-key filtered)
    #   include_build_metadata: false      # bazel.metadata.* pathway (per-key filtered)
    #   include_command_line: false        # bazel.command_line (coarse only)
    # Per-target detail level filtering. default_level applies when no rule
    # matches; rules are evaluated in order and first match wins. Levels:
    #   drop       emits only the root bazel.build and bazel.metrics spans
    #   build_only same as drop for per-target emission
    #   targets    also emits bazel.target, skips actions/tests
    #   verbose    emits everything (default, preserves pre-filter behaviour)
    # Patterns: "//pkg:target" (exact), "//pkg:*" (all targets in pkg),
    # "//pkg/..." (all targets under pkg and descendants). See docs/filter.md.
    # filter:
    #   default_level: verbose
    #   rules:
    #     - pattern: "//third_party/..."
    #       detail_level: build_only
    #     - pattern: "//src/main/..."
    #       detail_level: verbose
    # Summary counters stamped on the root bazel.build span
    # (bazel.summary.total_targets, .total_actions, .failed_actions,
    # .success_actions, .total_tests, .passed_tests, .failed_tests,
    # .flaky_tests). Counts reflect the full build — a target dropped by
    # the filter above still contributes to the totals. Default: enabled.
    # summary:
    #   enabled: true

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  batch:
    send_batch_size: 8192
    send_batch_max_size: 8192
    timeout: 200ms
  # Uncomment and add to each pipeline's processors list (after memory_limiter,
  # before batch) to scrub sensitive attributes before export. Regex-based
  # value redaction is expensive — prefer blocked_key_patterns when possible.
  # redaction:
  #   allow_all_keys: true
  #   blocked_key_patterns:
  #     - ".*user.*"
  #     - ".*email.*"
  #     - ".*token.*"
  #   blocked_values:
  #     - "(?i)bearer\\s+[A-Za-z0-9._\\-]+"
  #     - "[A-Za-z0-9._%+\\-]+@[A-Za-z0-9.\\-]+\\.[A-Za-z]{2,}"
  #   summary: debug

exporters:
  otlp_grpc/datadog:
    endpoint: "localhost:4317"
    tls:
      insecure: true # Only acceptable for same-host communication (e.g. sidecar Datadog Agent).
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 5000
  debug:
    verbosity: basic

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: "localhost"
                port: 8888
  pipelines:
    traces:
      receivers: [bes]
      processors: [memory_limiter, batch]
      exporters: [otlp_grpc/datadog, debug]
    logs:
      receivers: [bes]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [bes]
      processors: [memory_limiter, batch]
      exporters: [otlp_grpc/datadog, debug]
