extensions:
  health_check:
    endpoint: "localhost:13133"
  # Uncomment to require a bearer token on the BES gRPC endpoint.
  # Must also be listed in service.extensions and referenced from
  # receivers.bes.auth.authenticator below.
  # bearertokenauth:
  #   scheme: "Bearer"
  #   tokens:
  #     - "REPLACE_WITH_SECRET_TOKEN"
  #   # Or load from disk and hot-reload on change:
  #   # filename: /etc/otelcol/bes-tokens.txt

receivers:
  bes:
    endpoint: "localhost:8082"
    # Uncomment alongside the bearertokenauth extension above to enforce auth.
    # auth:
    #   authenticator: bearertokenauth
    # Uncomment to enable mutual TLS on the BES gRPC endpoint.
    # Bazel clients must be pointed at --bes_backend=grpcs://... and configured
    # with a matching client certificate when client_ca_file is set.
    # tls:
    #   cert_file: /etc/otelcol/certs/server.crt
    #   key_file: /etc/otelcol/certs/server.key
    #   client_ca_file: /etc/otelcol/certs/ca.crt

processors:
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
    spike_limit_mib: 128
  batch:
    send_batch_size: 8192
    send_batch_max_size: 8192
    timeout: 200ms
  # Uncomment and add to each pipeline's processors list (after memory_limiter,
  # before batch) to scrub sensitive attributes before export. Regex-based
  # value redaction is expensive — prefer blocked_key_patterns when possible.
  # redaction:
  #   allow_all_keys: true
  #   blocked_key_patterns:
  #     - ".*user.*"
  #     - ".*email.*"
  #     - ".*token.*"
  #   blocked_values:
  #     - "(?i)bearer\\s+[A-Za-z0-9._\\-]+"
  #     - "[A-Za-z0-9._%+\\-]+@[A-Za-z0-9.\\-]+\\.[A-Za-z]{2,}"
  #   summary: debug

exporters:
  otlp_grpc/datadog:
    endpoint: "localhost:4317"
    tls:
      insecure: true # Only acceptable for same-host communication (e.g. sidecar Datadog Agent).
    retry_on_failure:
      enabled: true
      initial_interval: 5s
      max_interval: 30s
      max_elapsed_time: 300s
    sending_queue:
      enabled: true
      num_consumers: 10
      queue_size: 5000
  debug:
    verbosity: basic

service:
  extensions: [health_check]
  telemetry:
    logs:
      level: info
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: "localhost"
                port: 8888
  pipelines:
    traces:
      receivers: [bes]
      processors: [memory_limiter, batch]
      exporters: [otlp_grpc/datadog, debug]
    logs:
      receivers: [bes]
      processors: [memory_limiter, batch]
      exporters: [debug]
    metrics:
      receivers: [bes]
      processors: [memory_limiter, batch]
      exporters: [otlp_grpc/datadog, debug]
